server:
  port: 8087

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://notification-db:5432/notification_db}
    username: ${POSTGRES_USER:${SPRING_DATASOURCE_USERNAME}}
    password: ${POSTGRES_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

notification:
  kafka:
    enabled: ${NOTIFICATION_KAFKA_ENABLED:false}
    topics:
      events: ${NOTIFICATION_KAFKA_TOPIC:lithoapp.notifications}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.lithoapp.notification: INFO
    org.hibernate.SQL: WARN
