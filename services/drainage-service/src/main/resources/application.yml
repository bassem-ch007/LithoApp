server:
  port: 8084

spring:
  application:
    name: drainage-service

  datasource:
    url: jdbc:postgresql://localhost:5434/drainage_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Scheduler configuration
drainage:
  reminder:
    days-before: 3   # how many days before plannedRemovalDate to send pre-reminder
