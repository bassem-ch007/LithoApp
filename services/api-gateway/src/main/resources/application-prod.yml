server:
  port: 9090

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - PreserveHostHeader
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origin-patterns:
                  - ${FRONTEND_ALLOWED_ORIGIN:https://*.lithoapp.local}
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowed-headers:
                  - Authorization
                  - Content-Type
                  - Accept
                  - X-Requested-With
                exposed-headers:
                  - Location
                  - Content-Disposition
                allow-credentials: true
                max-age: 3600
          routes:
            - id: patient-service
              uri: ${PATIENT_SERVICE_URI:http://patient-service:8086}
              predicates:
                - Path=/patients/**

            - id: episode-service
              uri: ${EPISODE_SERVICE_URI:http://episode-service:8085}
              predicates:
                - Path=/episodes/**

            - id: analysis-service
              uri: ${ANALYSIS_SERVICE_URI:http://analysis-service:8082}
              predicates:
                - Path=/api/analysis-requests/**

            - id: drainage-service
              uri: ${DRAINAGE_SERVICE_URI:http://drainage-service:8084}
              predicates:
                - Path=/api/drainages/**

            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URI:http://notification-service:8087}
              predicates:
                - Path=/notifications/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,gateway
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
    gateway:
      access: read-only
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO
    reactor.netty.http.client: WARN
