server:
  port: 8086
  servlet:
    context-path: /

spring:
  application:
    name: patient-service

  datasource:
    url: jdbc:postgresql://localhost:5436/lithoapp_patients
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

episode-service:
  base-url: http://localhost:8085

logging:
  level:
    com.lithoapp.patientservice: DEBUG
    org.hibernate.SQL: DEBUG
