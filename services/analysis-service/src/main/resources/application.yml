spring:
  application:
    name: analysis-service

  # Prevents startup failure if DB/Services are down
  main:
    lazy-initialization: true

  # Security — JWT resource server
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/medical-platform}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/medical-platform/protocol/openid-connect/certs}

  # PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5433/bilan_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres

  # JPA / Hibernate
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  # Multipart File Handling
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

server:
  port: 8082

# Custom Storage Configuration
storage:
  type: minio # Active adapter: minio | local
  minio:
    endpoint: http://localhost:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: analysis-pdfs
  local:
    base-path: ./uploads

# Custom Business Logic Props
analysis:
  upload:
    max-pdf-size-mb: 10

# Inter-service HTTP clients
patient-service:
  base-url: http://localhost:8086
episode-service:
  base-url: http://localhost:8085

# SpringDoc / Swagger UI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

# Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# Logging
logging:
  level:
    com:
      lithoapp:
        analysis: DEBUG