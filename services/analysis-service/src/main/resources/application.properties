spring.application.name=analysis-service
server.port=8082

# Security — JWT resource server
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/medical-platform/protocol/openid-connect/certs}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5433/bilan_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#File storage
# Active adapter: minio | local
storage.type=minio

storage.minio.endpoint=http://localhost:9000
storage.minio.access-key=minioadmin
storage.minio.secret-key=minioadmin
storage.minio.bucket=analysis-pdfs

# Local adapter (only used when storage.type=local)
storage.local.base-path=./uploads

#  Multipart
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# JPA
spring.jpa.open-in-view=false

# ------------------------------------------------------------
# SpringDoc / Swagger UI
# ------------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=alpha

#  Logging
logging.level.com.lithoapp.analysis=DEBUG

# ------------------------------------------------------------
# Inter-service HTTP clients
# ------------------------------------------------------------
patient-service.base-url=http://localhost:8086
episode-service.base-url=http://localhost:8085

# ------------------------------------------------------------
# Actuator expose health endpoint only
# ------------------------------------------------------------
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
