server:
  port: 8082

spring:
  main:
    lazy-initialization: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/bilan_db}
    username: ${POSTGRES_USER:${SPRING_DATASOURCE_USERNAME}}
    password: ${POSTGRES_PASSWORD:${SPRING_DATASOURCE_PASSWORD}}
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

  servlet:
    multipart:
      max-file-size: ${ANALYSIS_MAX_FILE_SIZE:20MB}
      max-request-size: ${ANALYSIS_MAX_REQUEST_SIZE:25MB}

storage:
  type: ${STORAGE_TYPE:minio}
  minio:
    endpoint: ${STORAGE_MINIO_ENDPOINT:http://minio:9000}
    access-key: ${STORAGE_MINIO_ACCESS_KEY:${MINIO_ACCESS_KEY:${MINIO_ROOT_USER}}}
    secret-key: ${STORAGE_MINIO_SECRET_KEY:${MINIO_SECRET_KEY:${MINIO_ROOT_PASSWORD}}}
    bucket: ${STORAGE_MINIO_BUCKET:analysis-pdfs}
  local:
    base-path: ${STORAGE_LOCAL_BASE_PATH:./uploads}

analysis:
  upload:
    max-pdf-size-mb: ${ANALYSIS_UPLOAD_MAX_PDF_SIZE_MB:10}

patient-service:
  base-url: ${PATIENT_SERVICE_BASE_URL:http://patient-service:8086}
episode-service:
  base-url: ${EPISODE_SERVICE_BASE_URL:http://episode-service:8085}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.lithoapp.analysis: INFO
    org.hibernate.SQL: WARN
