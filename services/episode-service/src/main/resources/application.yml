server:
  port: 8085

spring:
  application:
    name: episode-service

  datasource:
    url: jdbc:postgresql://localhost:5437/episode_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.lithoapp.episodeservice: DEBUG
    org.hibernate.SQL: DEBUG

# ------------------------------------------------------------
# Inter-service HTTP clients
# ------------------------------------------------------------
patient-service:
  base-url: http://localhost:8086

