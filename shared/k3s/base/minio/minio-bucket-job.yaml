apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-analysis-bucket
  namespace: lithoapp
spec:
  backoffLimit: 12
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-mc
          image: docker.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: lithoapp-secrets
                  key: MINIO_ROOT_USER
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lithoapp-secrets
                  key: MINIO_ROOT_PASSWORD
            - name: STORAGE_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: lithoapp-secrets
                  key: STORAGE_MINIO_ACCESS_KEY
            - name: STORAGE_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lithoapp-secrets
                  key: STORAGE_MINIO_SECRET_KEY
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              until mc alias set local http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
                sleep 5
              done
              mc mb -p local/analysis-pdfs || true
              mc anonymous set none local/analysis-pdfs || true
              if [ "$STORAGE_MINIO_ACCESS_KEY" != "$MINIO_ROOT_USER" ]; then
                mc admin user add local "$STORAGE_MINIO_ACCESS_KEY" "$STORAGE_MINIO_SECRET_KEY" || true
                mc admin policy attach local readwrite --user "$STORAGE_MINIO_ACCESS_KEY" || true
              fi

