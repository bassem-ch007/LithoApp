apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-service
  namespace: lithoapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analysis-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: analysis-service
    spec:
      containers:
        - name: analysis-service
          image: docker.io/bassem00/lithoapp-analysis-service:replace-with-git-sha
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8082
          envFrom:
            - configMapRef:
                name: lithoapp-common-config
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: lithoapp-common-config
                  key: ANALYSIS_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: lithoapp-secrets
                  key: POSTGRES_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: lithoapp-secrets
                  key: POSTGRES_PASSWORD
            - name: STORAGE_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: lithoapp-secrets
                  key: STORAGE_MINIO_ACCESS_KEY
            - name: STORAGE_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: lithoapp-secrets
                  key: STORAGE_MINIO_SECRET_KEY
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 90
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 150m
              memory: 384Mi
            limits:
              cpu: 750m
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

