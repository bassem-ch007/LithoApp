apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-initdb
  namespace: lithoapp
data:
  01-create-databases.sh: |
    #!/bin/sh
    set -eu

    sql_escape() {
      printf "%s" "$1" | sed "s/'/''/g"
    }

    ident_escape() {
      printf "%s" "$1" | sed 's/"/""/g'
    }

    role_exists() {
      role_sql="$(sql_escape "$1")"
      psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='${role_sql}'" | grep -q 1
    }

    ensure_role() {
      role="$1"
      password="$2"

      if [ "$role" = "$POSTGRES_USER" ]; then
        return 0
      fi

      role_ident="$(ident_escape "$role")"
      password_sql="$(sql_escape "$password")"

      if role_exists "$role"; then
        psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres -c "ALTER ROLE \"${role_ident}\" WITH LOGIN PASSWORD '${password_sql}'"
      else
        psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres -c "CREATE ROLE \"${role_ident}\" LOGIN PASSWORD '${password_sql}'"
      fi
    }

    create_database() {
      db="$1"
      owner="$2"
      db_sql="$(sql_escape "$db")"

      if ! psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname postgres -tAc "SELECT 1 FROM pg_database WHERE datname='${db_sql}'" | grep -q 1; then
        createdb --username "$POSTGRES_USER" --owner "$owner" "$db"
      fi
    }

    ensure_role "$KC_DB_USERNAME" "$KC_DB_PASSWORD"

    create_database "$PATIENT_DB_NAME" "$POSTGRES_USER"
    create_database "$EPISODE_DB_NAME" "$POSTGRES_USER"
    create_database "$ANALYSIS_DB_NAME" "$POSTGRES_USER"
    create_database "$DRAINAGE_DB_NAME" "$POSTGRES_USER"
    create_database "$NOTIFICATION_DB_NAME" "$POSTGRES_USER"
    create_database "$KEYCLOAK_DB_NAME" "$KC_DB_USERNAME"

