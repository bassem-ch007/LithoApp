apiVersion: v1
kind: ConfigMap
metadata:
  name: lithoapp-common-config
  namespace: lithoapp
data:
  SPRING_PROFILES_ACTIVE: "prod"
  JAVA_TOOL_OPTIONS: "-Xms128m -Xmx384m -XX:+UseContainerSupport -Djava.security.egd=file:/dev/./urandom"

  FRONTEND_PUBLIC_URL: "https://lithoapp.online"
  FRONTEND_WWW_PUBLIC_URL: "https://www.lithoapp.online"
  FRONTEND_ALLOWED_ORIGIN: "https://lithoapp.online"
  FRONTEND_ALLOWED_ORIGINS: "https://lithoapp.online,https://www.lithoapp.online"
  API_PUBLIC_URL: "https://api.lithoapp.online"

  PATIENT_SERVICE_BASE_URL: "http://patient-service:8086"
  EPISODE_SERVICE_BASE_URL: "http://episode-service:8085"
  NOTIFICATION_SERVICE_BASE_URL: "http://notification-service:8087"

  PATIENT_SERVICE_URI: "http://patient-service:8086"
  EPISODE_SERVICE_URI: "http://episode-service:8085"
  ANALYSIS_SERVICE_URI: "http://analysis-service:8082"
  DRAINAGE_SERVICE_URI: "http://drainage-service:8084"
  NOTIFICATION_SERVICE_URI: "http://notification-service:8087"

  PATIENT_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/patient_db"
  EPISODE_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/episode_db"
  ANALYSIS_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/bilan_db"
  DRAINAGE_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/drainage_db"
  NOTIFICATION_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/notification_db"

  KEYCLOAK_PUBLIC_URL: "https://auth.lithoapp.online"
  KEYCLOAK_ISSUER_URI: "https://auth.lithoapp.online/realms/medical-platform"
  KEYCLOAK_JWK_SET_URI: "http://keycloak:8080/realms/medical-platform/protocol/openid-connect/certs"

  STORAGE_TYPE: "minio"
  STORAGE_MINIO_ENDPOINT: "http://minio:9000"
  STORAGE_MINIO_BUCKET: "analysis-pdfs"
  STORAGE_LOCAL_BASE_PATH: "/app/uploads"
  ANALYSIS_UPLOAD_MAX_PDF_SIZE_MB: "10"
  DRAINAGE_REMINDER_DAYS_BEFORE: "3"

