apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-config
  namespace: lithoapp
data:
  KC_HTTP_ENABLED: "true"
  KC_HOSTNAME_STRICT: "false"

  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_STARTTLS: "true"
  SMTP_SSL: "false"
  SMTP_AUTH: "true"
  SMTP_DEBUG: "true"

  FRONTEND_BASE_URL: "http://localhost:4200"
  FRONTEND_REDIRECT_URI: "http://localhost:4200/*"
  FRONTEND_POST_LOGOUT_REDIRECT_URIS: "http://localhost:4200/*"
  FRONTEND_WEB_ORIGIN: "http://localhost:4200"

  render-realm.js: |
    const fs = require("fs");

    const templatePath = "/realm-template/medical-platform-realm.json.tpl";
    const outputPath = "/realm-rendered/medical-platform-realm.json";
    const requiredVariables = [
      "SMTP_HOST",
      "SMTP_PORT",
      "SMTP_USERNAME",
      "SMTP_PASSWORD",
      "SMTP_FROM",
      "SMTP_STARTTLS",
      "SMTP_SSL",
      "SMTP_AUTH",
      "SMTP_DEBUG",
      "GOOGLE_CLIENT_ID",
      "GOOGLE_CLIENT_SECRET",
      "FRONTEND_BASE_URL",
      "FRONTEND_REDIRECT_URI",
      "FRONTEND_POST_LOGOUT_REDIRECT_URIS",
      "FRONTEND_WEB_ORIGIN"
    ];

    let rendered = fs.readFileSync(templatePath, "utf8").replace(/^\uFEFF/, "");

    for (const name of requiredVariables) {
      const value = process.env[name] ?? "";
      const jsonEscapedValue = JSON.stringify(value).slice(1, -1);
      rendered = rendered.split(`__${name}__`).join(jsonEscapedValue);
    }

    JSON.parse(rendered);
    fs.writeFileSync(outputPath, rendered);
