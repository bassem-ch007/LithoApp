apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: lithoapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: lithoapp/api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9090
          envFrom:
            - configMapRef:
                name: lithoapp-common-config
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

