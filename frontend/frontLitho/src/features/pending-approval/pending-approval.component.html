<section class="pending-approval">
  <h1>Compte en attente d'approbation</h1>
  <p>
    Votre compte a bien été créé, mais aucun rôle ne lui a encore été attribué.
    Un administrateur doit valider votre compte et vous attribuer un rôle avant que vous puissiez accéder à la plateforme.
  </p>

  <div class="actions">
    <button type="button" class="secondary" (click)="logout()">Déconnexion</button>
    <button type="button" (click)="checkAgain()" [disabled]="isChecking">
      {{ isChecking ? 'Vérification...' : 'Actualiser / vérifier à nouveau' }}
    </button>
  </div>
</section>
