<section class="pending-approval">
  <h1>Pending Approval</h1>
  <p>
    Your account has been created successfully, but it has not been assigned a role yet.
    An administrator must validate your account and assign you a role before you can access the platform.
  </p>

  <div class="actions">
    <button type="button" class="secondary" (click)="logout()">Logout</button>
    <button type="button" (click)="checkAgain()" [disabled]="isChecking">
      {{ isChecking ? 'Checking...' : 'Refresh / Check again' }}
    </button>
  </div>
</section>
