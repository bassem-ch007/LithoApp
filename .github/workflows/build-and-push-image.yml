name: Build and Push Image

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build"
        required: true
        type: choice
        options:
          - api-gateway
          - patient-service
          - episode-service
          - analysis-service
          - drainage-service
          - frontend

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute image metadata
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "IMAGE_TAG=$SHORT_SHA" >> $GITHUB_ENV

          if [ "${{ inputs.service }}" = "frontend" ]; then
            echo "IMAGE_NAME=lithoapp-frontend" >> $GITHUB_ENV
            echo "DOCKERFILE=shared/docker/prod/frontend/Dockerfile" >> $GITHUB_ENV
          else
            echo "IMAGE_NAME=lithoapp-${{ inputs.service }}" >> $GITHUB_ENV
            echo "DOCKERFILE=shared/docker/prod/${{ inputs.service }}/Dockerfile" >> $GITHUB_ENV
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build \
            -f "$DOCKERFILE" \
            -t ${{ vars.DOCKERHUB_NAMESPACE }}/${IMAGE_NAME}:${IMAGE_TAG} \
            .

      - name: Push image
        run: |
          docker push \
            ${{ vars.DOCKERHUB_NAMESPACE }}/${IMAGE_NAME}:${IMAGE_TAG}

      - name: Show pushed image
        run: |
          echo "Pushed image:"
          echo "${{ vars.DOCKERHUB_NAMESPACE }}/${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Cleanup dangling Docker data
        if: always()
        run: |
          docker image prune -f
          docker builder prune -f --filter "until=24h"
          docker container prune -f