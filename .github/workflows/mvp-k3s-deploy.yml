name: MVP Deploy LithoApp to k3s

on:
  workflow_dispatch:

concurrency:
  group: lithoapp-mvp-k3s
  cancel-in-progress: false

env:
  DOCKERHUB_NAMESPACE: ${{ vars.DOCKERHUB_NAMESPACE }}
  IMAGE_TAG: ${{ github.sha }}
  K3S_NAMESPACE: lithoapp

jobs:
  build-push-deploy:
    name: Build images, push DockerHub, deploy rendered k3s manifests
    runs-on: self-hosted
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate runner tools and cluster access
        shell: bash
        run: |
          set -euo pipefail
          docker version
          kubectl version --client=true
          kubectl kustomize --help >/dev/null
          jq --version
          kubectl get nodes

      - name: Verify Kubernetes secrets are already bootstrapped
        shell: bash
        run: |
          set -euo pipefail
          bash shared/k3s/scripts/mvp-verify-secrets.sh

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push all LithoApp images
        shell: bash
        run: |
          set -euo pipefail

          services=(
            "patient-service:shared/docker/prod/patient-service/Dockerfile:lithoapp-patient-service"
            "episode-service:shared/docker/prod/episode-service/Dockerfile:lithoapp-episode-service"
            "analysis-service:shared/docker/prod/analysis-service/Dockerfile:lithoapp-analysis-service"
            "drainage-service:shared/docker/prod/drainage-service/Dockerfile:lithoapp-drainage-service"
            "notification-service:shared/docker/prod/notification-service/Dockerfile:lithoapp-notification-service"
            "api-gateway:shared/docker/prod/api-gateway/Dockerfile:lithoapp-api-gateway"
            "frontend:shared/docker/prod/frontend/Dockerfile:lithoapp-frontend"
          )

          for item in "${services[@]}"; do
            IFS=":" read -r service dockerfile image <<< "$item"
            echo "============================================================"
            echo "Building $service"
            echo "Dockerfile: $dockerfile"
            echo "Image SHA: docker.io/${DOCKERHUB_NAMESPACE}/${image}:${IMAGE_TAG}"
            echo "============================================================"

            if [ ! -f "$dockerfile" ]; then
              echo "ERROR: missing Dockerfile: $dockerfile" >&2
              exit 1
            fi

            docker buildx build \
              --file "$dockerfile" \
              --tag "docker.io/${DOCKERHUB_NAMESPACE}/${image}:${IMAGE_TAG}" \
              --tag "docker.io/${DOCKERHUB_NAMESPACE}/${image}:latest" \
              --cache-from "type=gha,scope=${image}" \
              --cache-to "type=gha,mode=max,scope=${image}" \
              --push \
              .
          done

      - name: Deploy MVP rendered manifests to k3s
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_TAG="${IMAGE_TAG}" \
          DOCKERHUB_NAMESPACE="${DOCKERHUB_NAMESPACE}" \
          NAMESPACE="${K3S_NAMESPACE}" \
          bash shared/k3s/scripts/mvp-deploy-prod.sh

      - name: Show final status
        if: always()
        shell: bash
        run: |
          bash shared/k3s/scripts/mvp-status.sh || true

      - name: Show failing pod details
        if: failure()
        shell: bash
        run: |
          set +e
          kubectl -n "${K3S_NAMESPACE}" get pods --no-headers | awk '$3!="Running" && $3!="Completed" {print $1}' | while read -r pod; do
            echo "============================================================"
            echo "POD: $pod"
            echo "============================================================"
            kubectl -n "${K3S_NAMESPACE}" describe pod "$pod" || true
            kubectl -n "${K3S_NAMESPACE}" logs "$pod" --all-containers --tail=200 || true
          done

