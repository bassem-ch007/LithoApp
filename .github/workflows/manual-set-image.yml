name: Manual set deployment image

on:
  workflow_dispatch:
    inputs:
      deployment:
        description: "Kubernetes deployment to update"
        required: true
        default: "frontend"
        type: choice
        options:
          - frontend
          - api-gateway
          - patient-service
          - episode-service
          - analysis-service
          - drainage-service
          - notification-service

      image_tag:
        description: "Existing DockerHub image tag to deploy"
        required: true
        default: "latest"

env:
  K3S_NAMESPACE: lithoapp
  DOCKERHUB_NAMESPACE: bassem00

jobs:
  set-image:
    name: Set image on selected deployment
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Resolve image name
        id: image
        shell: bash
        run: |
          set -euo pipefail

          DEPLOYMENT="${{ inputs.deployment }}"
          TAG="${{ inputs.image_tag }}"

          case "$DEPLOYMENT" in
            frontend)
              IMAGE="lithoapp-frontend"
              CONTAINER="frontend"
              ;;
            api-gateway)
              IMAGE="lithoapp-api-gateway"
              CONTAINER="api-gateway"
              ;;
            patient-service)
              IMAGE="lithoapp-patient-service"
              CONTAINER="patient-service"
              ;;
            episode-service)
              IMAGE="lithoapp-episode-service"
              CONTAINER="episode-service"
              ;;
            analysis-service)
              IMAGE="lithoapp-analysis-service"
              CONTAINER="analysis-service"
              ;;
            drainage-service)
              IMAGE="lithoapp-drainage-service"
              CONTAINER="drainage-service"
              ;;
            notification-service)
              IMAGE="lithoapp-notification-service"
              CONTAINER="notification-service"
              ;;
            *)
              echo "Unknown deployment: $DEPLOYMENT"
              exit 1
              ;;
          esac

          FULL_IMAGE="docker.io/${DOCKERHUB_NAMESPACE}/${IMAGE}:${TAG}"

          echo "deployment=$DEPLOYMENT" >> "$GITHUB_OUTPUT"
          echo "container=$CONTAINER" >> "$GITHUB_OUTPUT"
          echo "image=$FULL_IMAGE" >> "$GITHUB_OUTPUT"

          echo "Deployment: $DEPLOYMENT"
          echo "Container:  $CONTAINER"
          echo "Image:      $FULL_IMAGE"

      - name: Check cluster access
        shell: bash
        run: |
          set -euo pipefail
          kubectl get ns "${K3S_NAMESPACE}"
          kubectl -n "${K3S_NAMESPACE}" get deployment "${{ steps.image.outputs.deployment }}"

      - name: Update deployment image
        shell: bash
        run: |
          set -euo pipefail

          kubectl -n "${K3S_NAMESPACE}" set image \
            deployment/${{ steps.image.outputs.deployment }} \
            ${{ steps.image.outputs.container }}=${{ steps.image.outputs.image }}

      - name: Wait for rollout
        shell: bash
        run: |
          set -euo pipefail

          kubectl -n "${K3S_NAMESPACE}" rollout status \
            deployment/${{ steps.image.outputs.deployment }} \
            --timeout=300s

      - name: Show deployment status
        if: always()
        shell: bash
        run: |
          kubectl -n "${K3S_NAMESPACE}" get deployment "${{ steps.image.outputs.deployment }}" -o wide || true
          kubectl -n "${K3S_NAMESPACE}" get pods -l app=${{ steps.image.outputs.deployment }} -o wide || true
          kubectl -n "${K3S_NAMESPACE}" logs deployment/${{ steps.image.outputs.deployment }} --all-containers --tail=120 || true

      - name: Show failure details
        if: failure()
        shell: bash
        run: |
          set +e
          kubectl -n "${K3S_NAMESPACE}" describe deployment "${{ steps.image.outputs.deployment }}" || true
          kubectl -n "${K3S_NAMESPACE}" describe pods -l app=${{ steps.image.outputs.deployment }} || true